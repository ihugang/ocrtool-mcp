name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Import code signing certificate
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build release artifacts
        env:
          NOTARIZE: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_PASSWORD != '' && 'always' || 'never' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          UPDATE_FORMULA: true
        run: ./scripts/build-release.sh ${{ steps.get_version.outputs.VERSION }}

      - name: Test packaged binary
        run: ./release/ocrtool-mcp-v${{ steps.get_version.outputs.VERSION }}-universal --help

      - name: Generate release notes
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## Installation

          ### Homebrew

          \`\`\`bash
          brew tap ihugang/ocrtool
          brew install ocrtool-mcp
          \`\`\`

          ### Direct Download

          \`\`\`bash
          curl -L -O https://github.com/ihugang/ocrtool-mcp/releases/download/v${{ steps.get_version.outputs.VERSION }}/ocrtool-mcp-v${{ steps.get_version.outputs.VERSION }}-universal-macos.tar.gz
          tar -xzf ocrtool-mcp-v${{ steps.get_version.outputs.VERSION }}-universal-macos.tar.gz
          chmod +x ocrtool-mcp-v${{ steps.get_version.outputs.VERSION }}-universal
          sudo mv ocrtool-mcp-v${{ steps.get_version.outputs.VERSION }}-universal /usr/local/bin/ocrtool-mcp
          \`\`\`

          ## What's Changed

          See [CHANGELOG](https://github.com/ihugang/ocrtool-mcp/blob/master/CHANGELOG.md) for detailed changes.

          ## Checksums (SHA256)

          \`\`\`
          $(cat release/checksums.txt)
          \`\`\`

          ## Homebrew Formula

          The workflow also syncs the repository formula on the default branch. If you maintain a separate tap, copy:
          [Formula/ocrtool-mcp.rb](https://github.com/ihugang/ocrtool-mcp/blob/master/Formula/ocrtool-mcp.rb)

          ## Documentation

          - [English README](https://github.com/ihugang/ocrtool-mcp/blob/master/README.md)
          - [中文文档](https://github.com/ihugang/ocrtool-mcp/blob/master/README.zh.md)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/ocrtool-mcp-v${{ steps.get_version.outputs.VERSION }}-universal
            release/ocrtool-mcp-v${{ steps.get_version.outputs.VERSION }}-universal-macos.tar.gz
            release/checksums.txt
            release/release-metadata.json
            Formula/ocrtool-mcp.rb
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync formula to default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          cp Formula/ocrtool-mcp.rb /tmp/ocrtool-mcp.rb
          git fetch origin "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"
          cp /tmp/ocrtool-mcp.rb Formula/ocrtool-mcp.rb
          if git diff --quiet -- Formula/ocrtool-mcp.rb; then
            echo "Formula already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/ocrtool-mcp.rb
          git commit -m "chore: update Homebrew formula for v${{ steps.get_version.outputs.VERSION }}"
          git push origin "HEAD:$DEFAULT_BRANCH"
