name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Run tests
        run: swift test

      - name: Build release artifacts
        env:
          SIGN_IDENTITY: ""
          NOTARIZE: never
          UPDATE_FORMULA: false
          RUN_TESTS: false
        run: ./scripts/build-release.sh ci

      - name: Test packaged binary
        run: ./release/ocrtool-mcp-vci-universal --help

      - name: Swift lint (if available)
        continue-on-error: true
        run: |
          if command -v swiftlint &> /dev/null; then
            swiftlint
          else
            echo "SwiftLint not installed, skipping"
          fi
